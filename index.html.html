<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salomon Style | Studio de Autor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --oro-brand: #cca152;
            --negro-absoluto: #000000;
            --gris-borde: #111112;
            --blanco: #ffffff;
            --texto-premium: #e0e0e0;
        }

        /* Reset General */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            background-color: var(--negro-absoluto);
            font-family: 'Montserrat', sans-serif;
            color: var(--blanco);
            overflow-x: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        /* FONDO DE MÁRMOL OSCURO PREMIUM */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Imagen de textura de mármol oscuro de alta resolución */
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.7) 100%), 
                              url('https://images.unsplash.com/photo-1618220179428-22790b461013?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
        }

        /* Brillo dorado central difuminado */
        .luz-central {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(204, 161, 82, 0.12) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* ENCABEZADO: Logotipo */
        header {
            padding: 50px 20px 0px;
            text-align: center;
        }

        .logo-contenedor {
            display: inline-block;
            max-width: 260px;
            width: 100%;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.9));
        }

        .logo-contenedor img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* SECCIÓN CENTRAL: Textos y Botón */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
            max-width: 850px;
            margin: 0 auto;
        }

        h1 {
            font-size: clamp(2.3rem, 7vw, 4rem);
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 25px;
            text-transform: uppercase;
            color: var(--blanco);
            text-shadow: 0 4px 15px rgba(0,0,0,0.9);
        }

        p {
            font-size: 1.2rem;
            font-weight: 300;
            line-height: 1.8;
            color: var(--texto-premium);
            max-width: 700px;
            margin-bottom: 45px;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        /* BOTÓN DE RESERVA DORADO METÁLICO PRESTIGE */
        .btn-booking {
            display: inline-block;
            background: linear-gradient(180deg, #e5c283 0%, #cca152 50%, #916f31 100%);
            color: #000000;
            padding: 22px 65px;
            text-decoration: none;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.95rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255, 255, 255, 0.4);
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .btn-booking:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(204, 161, 82, 0.4);
            background: linear-gradient(180deg, #ffffff 0%, #cca152 60%, #916f31 100%);
        }

        /* FOOTER: Enlaces a Redes Sociales */
        footer {
            background-color: rgba(1, 1, 1, 0.85);
            backdrop-filter: blur(5px);
            padding: 45px 20px;
            border-top: 1px solid var(--gris-borde);
            text-align: center;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .social-links a {
            color: var(--texto-premium);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 2.5px;
            padding-bottom: 5px;
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .social-links a:hover {
            color: var(--blanco);
            border-bottom-color: var(--oro-brand);
        }

        .copyright-marca {
            font-size: 0.7rem;
            color: #666666;
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 1.8;
        }

        /* Adaptabilidad para Celulares */
        @media (max-width: 600px) {
            header { padding-top: 35px; }
            .logo-contenedor { max-width: 210px; }
            h1 { font-size: 2.2rem; letter-spacing: 2px; }
            p { font-size: 1rem; margin-bottom: 35px; }
            .btn-booking { padding: 20px 50px; width: 100%; max-width: 320px; }
            .social-links { gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="luz-central"></div>

    <header>
        <div class="logo-contenedor">
            <img src="logo.png" alt="Salomon Style">
        </div>
    </header>

    <main>
        <h1>Estética de Alto Impacto</h1>
        <p>Especialista en diseño de imagen masculina. Experiencia técnica profesional orientada a la excelencia y el detalle.</p>
        
        <a href="https://docs.google.com/forms/d/e/1FAIpQLScBnaMuRb2NhNQIz2NJZy67Iv7bePDStfSLJxgc8ltyTpQzmw/viewform?usp=dialog" 
           class="btn-booking" 
           target="_blank" 
           rel="noopener">
            Agendar Cita
        </a>
    </main>

    <footer>
        <nav class="social-links">
            <a href="https://instagram.com/Salomon_style" target="_blank" rel="noopener">INSTAGRAM</a>
            <a href="https://wa.me/573227735325" target="_blank" rel="noopener">WHATSAPP</a>
            <a href="https://www.facebook.com/salomonstyle.bpm/" target="_blank" rel="noopener">FACEBOOK</a>
            <a href="https://tiktok.com/@Salomon_style" target="_blank" rel="noopener">TIKTOK</a>
        </nav>
        <p class="copyright-marca">
            SALOMON STYLE – STUDIO DE AUTOR &copy; 2026<br>
            TÉCNICO CERTIFICADO | RESPALDO PROFESIONAL SENA
        </p>
    </footer>

</body>
</html>
